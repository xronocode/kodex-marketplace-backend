# --- GRACE MODULE_CONTRACT ---
# PURPOSE: Alembic CLI configuration file.
# SCOPE: Script location, template, database URL placeholder.
# DEPENDS: alembic package.
# LINKS: alembic/env.py (overrides sqlalchemy.url at runtime)
# --- GRACE MODULE_MAP ---
# EXPORTS: alembic CLI settings
# --- GRACE CHANGE_SUMMARY ---
# 2026-03-28: Initial alembic.ini — URL overridden by env.py.

# --- START_BLOCK_ALEMBIC_GENERAL ---
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# --- END_BLOCK_ALEMBIC_GENERAL ---

# --- START_BLOCK_ALEMBIC_URL ---
sqlalchemy.url = postgresql+asyncpg://kodex:changeme_strong_password@localhost:5432/kodex_db
# --- END_BLOCK_ALEMBIC_URL ---

# --- START_BLOCK_ALEMBIC_LOGGING ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
# --- END_BLOCK_ALEMBIC_LOGGING ---
